# BIOVISION-AI Default Configuration (project root)
# Use: python scripts/train.py --config config/default.yaml

model:
  dermoscopy_backbone: efficientnet_b0
  clinical_backbone: efficientnet_b0
  dermoscopy_embed_dim: 1280
  clinical_embed_dim: 1280
  clinical_data_embed_dim: 64
  fusion_type: concat
  fusion_hidden_dim: 512
  num_diagnosis_classes: 7
  diagnosis_classes:
    - nevus
    - melanoma
    - bcc
    - scc
    - seborrheic_keratosis
    - inflammatory
    - other
  risk_levels: 3
  risk_labels:
    - low
    - intermediate
    - high
  stage_labels:
    - early
    - intermediate
    - advanced
  trend_labels:
    - stable
    - slowly_progressive
    - rapidly_progressive
  segmentation_enabled: false
  heads:
    diagnosis: true
    risk: true
    stage: true
    trend: false

data:
  image_size: 224
  dermoscopy_size: 224
  clinical_size: 224
  num_clinical_features: 32

training:
  batch_size: 32
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.01
  focal_loss_gamma: 2.0
  optimizer: adamw
  scheduler: cosine

api:
  host: "0.0.0.0"
  port: 8000
  max_batch_size: 8
